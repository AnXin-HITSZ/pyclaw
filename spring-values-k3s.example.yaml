# Example K3s values for Spring Backend.
# Copy to spring-values-k3s.yaml on the server and replace placeholders there.
# Store JWT, admin password, pyclaw token, datasource password, and Redis password
# in the ECS private Secret/values. Do not commit real passwords.

image:
  repository: <ACR_REGISTRY>/pyclaw/spring-backend
  tag: "__COMMIT_SHA__"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: aliyun-acr-pull-secret

secret:
  create: false
  # Existing Secret must include SPRING_DATA_REDIS_PASSWORD.
  existingSecret: pyclaw-spring-backend-secret

env:
  SPRING_DATASOURCE_URL: jdbc:mysql://pyclaw-mysql:3306/pyclaw_control?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
  SPRING_DATASOURCE_USERNAME: pyclaw
  SPRING_JPA_DDL_AUTO: update
  SPRING_DATA_REDIS_HOST: redis-master.pyclaw.svc.cluster.local
  SPRING_DATA_REDIS_PORT: "6379"
  PYCLAW_BASE_URL: http://pyclaw.pyclaw.svc.cluster.local:8000
  BOOTSTRAP_ADMIN_USERNAME: admin
  PYCLAW_SANDBOX_ENABLED: "false"
  PYCLAW_SANDBOX_NAMESPACE_PREFIX: pyclaw-user
  PYCLAW_SANDBOX_RUNNER_IMAGE: ""
  PYCLAW_SANDBOX_RUNNER_IMAGE_PULL_POLICY: IfNotPresent
  PYCLAW_SANDBOX_RUNNER_PORT: "8000"
  PYCLAW_SANDBOX_WORKSPACE_MOUNT_PATH: /workspace
  PYCLAW_SANDBOX_PVC_STORAGE_SIZE: 1Gi
  PYCLAW_SANDBOX_CPU_REQUEST: 100m
  PYCLAW_SANDBOX_MEMORY_REQUEST: 256Mi
  PYCLAW_SANDBOX_CPU_LIMIT: 500m
  PYCLAW_SANDBOX_MEMORY_LIMIT: 768Mi
  PYCLAW_SANDBOX_IMAGE_PULL_SECRET_NAME: aliyun-acr-pull-secret
  PYCLAW_SANDBOX_IMAGE_PULL_SECRET_SOURCE_NAMESPACE: pyclaw

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-example-com-tls
      hosts:
        - api.example.com

persistence:
  enabled: false
  size: 2Gi

