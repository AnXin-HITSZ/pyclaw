name: Build Claw Runner

on:
  push:
    branches:
      - main
    paths:
      - "runtime/claw-runner/**"
      - ".github/workflows/build-claw-runner.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: saas-claw/claw-runner
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push claw-runner image
        uses: docker/build-push-action@v6
        with:
          context: ./runtime/claw-runner
          file: ./runtime/claw-runner/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
