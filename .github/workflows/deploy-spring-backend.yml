name: Deploy Spring Backend

on:
  push:
    branches:
      - main
    paths:
      - "spring-backend/**"
      - ".github/workflows/deploy-spring-backend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: pyclaw/spring-backend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push spring-backend image
        uses: docker/build-push-action@v6
        with:
          context: ./spring-backend
          file: ./spring-backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS K3s
        env:
          IMAGE_REPOSITORY: ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "bash -s -- '${{ github.ref_name }}' '${{ github.sha }}' '${IMAGE_REPOSITORY}' '${{ env.IMAGE_TAG }}'" <<'REMOTE'
          set -euo pipefail

          REF_NAME="$1"
          COMMIT_SHA="$2"
          IMAGE_REPOSITORY="$3"
          IMAGE_TAG="$4"
          KUBECONFIG_PATH="/etc/rancher/k3s/k3s.yaml"

          wait_for_k3s() {
            local attempts="${1:-6}"
            local delay_seconds="${2:-10}"
            for attempt in $(seq 1 "$attempts"); do
              if sudo /usr/local/bin/k3s kubectl --kubeconfig "$KUBECONFIG_PATH" get nodes --request-timeout=20s >/dev/null 2>&1; then
                return 0
              fi
              echo "k3s apiserver is not ready yet (${attempt}/${attempts}); waiting ${delay_seconds}s..."
              sleep "$delay_seconds"
            done
            return 1
          }

          ensure_k3s_ready() {
            if wait_for_k3s 6 10; then
              return 0
            fi
            echo "k3s apiserver did not respond; restarting k3s once before deploy..."
            sudo systemctl restart k3s
            wait_for_k3s 12 10
          }

          deploy_spring_backend() {
            sudo helm --kubeconfig "$KUBECONFIG_PATH" upgrade --install spring-backend ./spring-backend/helm \
              -n pyclaw \
              --create-namespace \
              -f spring-values-k3s.yaml \
              --set-string image.repository="$IMAGE_REPOSITORY" \
              --set-string image.tag="$IMAGE_TAG" \
              --timeout 10m
          }

          cd /opt/pyclaw
          rm -f .git/index.lock
          git fetch origin "$REF_NAME"
          git reset --hard "$COMMIT_SHA"

          ensure_k3s_ready
          if ! deploy_spring_backend; then
            echo "helm deploy failed; checking k3s health and retrying once..."
            ensure_k3s_ready
            deploy_spring_backend
          fi
          REMOTE
