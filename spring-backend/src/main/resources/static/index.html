<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pyclaw Admin</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 920px; }
    input, textarea, button { font: inherit; padding: .55rem; margin: .25rem 0; width: 100%; box-sizing: border-box; }
    button { width: auto; cursor: pointer; }
    pre { background: #111827; color: #e5e7eb; padding: 1rem; overflow: auto; }
    section { border: 1px solid #d1d5db; padding: 1rem; margin: 1rem 0; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>pyclaw Admin</h1>
  <section>
    <h2>Login</h2>
    <input id="username" value="admin" placeholder="username">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Login</button>
  </section>
  <section>
    <h2>Agent Run</h2>
    <textarea id="prompt" rows="4">你好，请用一句话介绍你自己。</textarea>
    <button onclick="runAgent()">Run</button>
  </section>
  <pre id="output"></pre>
  <script>
    let token = localStorage.getItem("token") || "";
    const out = document.getElementById("output");
    async function login() {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username: username.value, password: password.value})
      });
      const data = await res.json();
      token = data.accessToken || "";
      localStorage.setItem("token", token);
      out.textContent = JSON.stringify(data, null, 2);
    }
    async function runAgent() {
      const res = await fetch("/api/agent/run", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Authorization": "Bearer " + token},
        body: JSON.stringify({prompt: prompt.value, provider: "openai", sessionId: "spring-web-demo", toolProfile: "minimal"})
      });
      out.textContent = JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
