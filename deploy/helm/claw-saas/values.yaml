global:
  imagePullSecret: aliyun-acr-pull-secret
  secretName: claw-saas-secret

shared:
  datasourceUrl: "jdbc:mysql://claw-saas-mysql:3306/claw_saas_control?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai"
  datasourceUsername: claw_saas
  jpaDdlAuto: update
  redisHost: redis-master.claw-saas.svc.cluster.local
  redisPort: "6379"

gateway:
  image:
    repository: clawsaas/gateway
    tag: latest
    pullPolicy: IfNotPresent

backend-for-frontend:
  image:
    repository: clawsaas/backend-for-frontend
    tag: latest
    pullPolicy: IfNotPresent

claw-service:
  image:
    repository: clawsaas/claw-service
    tag: latest
    pullPolicy: IfNotPresent

runtime-service:
  image:
    repository: clawsaas/runtime-service
    tag: latest
    pullPolicy: IfNotPresent

agent-marketplace-service:
  image:
    repository: clawsaas/agent-marketplace-service
    tag: latest
    pullPolicy: IfNotPresent

billing-service:
  image:
    repository: clawsaas/billing-service
    tag: latest
    pullPolicy: IfNotPresent

skill-marketplace-service:
  image:
    repository: clawsaas/skill-marketplace-service
    tag: latest
    pullPolicy: IfNotPresent

pyclaw-runtime-api:
  image:
    repository: clawsaas/pyclaw-runtime-api
    tag: latest
    pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: saas.claw.anxin-hitsz.com
      paths:
        - path: /api
          pathType: Prefix
        - path: /actuator
          pathType: Prefix
  tls:
    - secretName: saas-claw-tls
      hosts:
        - saas.claw.anxin-hitsz.com
