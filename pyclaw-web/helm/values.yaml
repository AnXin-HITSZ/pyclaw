replicaCount: 1

image:
  repository: pyclaw-web
  tag: dev
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

backend:
  upstream: pyclaw-spring-backend.pyclaw.svc.cluster.local:8080

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
    - host: console.anxin-hitsz.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi
