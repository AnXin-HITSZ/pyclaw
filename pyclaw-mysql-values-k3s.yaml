image:
  repository: mysql
  tag: "8.4"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3306

mysql:
  database: pyclaw
  user: pyclaw
  auth:
    createSecret: false
    existingSecret: pyclaw-mysql-secret
    rootPasswordKey: MYSQL_ROOT_PASSWORD
    databaseKey: MYSQL_DATABASE
    userKey: MYSQL_USER
    passwordKey: MYSQL_PASSWORD

config:
  characterSetServer: utf8mb4
  collationServer: utf8mb4_unicode_ci

persistence:
  enabled: true
  storageClassName: ""
  size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
