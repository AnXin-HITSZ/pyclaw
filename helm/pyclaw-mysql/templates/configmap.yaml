apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pyclaw-mysql.fullname" . }}-config
  labels:
    {{- include "pyclaw-mysql.labels" . | nindent 4 }}
data:
  pyclaw.cnf: |
    [mysqld]
    character-set-server={{ .Values.config.characterSetServer }}
    collation-server={{ .Values.config.collationServer }}
    {{- with .Values.config.extra }}
{{ . | indent 4 }}
    {{- end }}
