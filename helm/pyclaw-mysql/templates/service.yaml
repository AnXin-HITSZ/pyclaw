apiVersion: v1
kind: Service
metadata:
  name: {{ include "pyclaw-mysql.fullname" . }}
  labels:
    {{- include "pyclaw-mysql.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: mysql
      port: {{ .Values.service.port }}
      targetPort: mysql
      protocol: TCP
  selector:
    {{- include "pyclaw-mysql.selectorLabels" . | nindent 4 }}
