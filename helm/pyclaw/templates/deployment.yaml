apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pyclaw.fullname" . }}
  labels:
    {{- include "pyclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pyclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pyclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pyclaw.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "pyclaw.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "pyclaw.fullname" . }}-config
            - secretRef:
                name: {{ include "pyclaw.secretName" . }}
                optional: true
          {{- if or .Values.extraEnv .Values.hostSsh.enabled (and .Values.ingressQueue.enabled .Values.ingressQueue.mysql.dsnSecretName) }}
          env:
            {{- if and .Values.ingressQueue.enabled .Values.ingressQueue.mysql.dsnSecretName }}
            - name: OPENCLAW_INGRESS_QUEUE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ingressQueue.mysql.dsnSecretName }}
                  key: {{ .Values.ingressQueue.mysql.dsnSecretKey }}
            {{- end }}
            {{- if .Values.hostSsh.enabled }}
            - name: HOST_SSH_KEY_PATH
              value: {{ printf "%s/id_ed25519" .Values.hostSsh.mountPath | quote }}
            - name: HOST_SSH_KNOWN_HOSTS_PATH
              value: {{ printf "%s/known_hosts" .Values.hostSsh.mountPath | quote }}
            - name: HOST_SSH_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hostSsh.existingSecret }}
                  key: host
            - name: HOST_SSH_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hostSsh.existingSecret }}
                  key: port
            - name: HOST_SSH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hostSsh.existingSecret }}
                  key: username
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: chatdata
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.hostSsh.enabled }}
            - name: host-ssh-secret
              mountPath: {{ .Values.hostSsh.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: chatdata
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pyclaw.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.hostSsh.enabled }}
        - name: host-ssh-secret
          secret:
            secretName: {{ .Values.hostSsh.existingSecret }}
            defaultMode: 0400
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
