{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pyclaw.secretName" . }}
  labels:
    {{- include "pyclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ default "" .Values.secret.values.OPENAI_API_KEY | quote }}
  {{- range $key, $value := .Values.secret.values }}
  {{- if and $value (ne $key "OPENAI_API_KEY") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}